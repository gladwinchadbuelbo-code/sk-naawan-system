<svg width="1400" height="1600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="700" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#0E6B3D">
    SK Digital Management System - Entity Relationship Diagram
  </text>
  
  <!-- Legend -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="200" height="80" fill="#F3F4F6" stroke="#0E6B3D" stroke-width="2" rx="5"/>
    <text x="100" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#0E6B3D">Legend</text>
    <rect x="10" y="30" width="15" height="15" fill="#1BA160"/>
    <text x="30" y="42" font-size="12" fill="#2E2E2E">Primary Key</text>
    <rect x="10" y="50" width="15" height="15" fill="#A7E89F"/>
    <text x="30" y="62" font-size="12" fill="#2E2E2E">Foreign Key</text>
  </g>

  <!-- USER Entity -->
  <g id="user-entity" transform="translate(100, 200)">
    <rect width="280" height="180" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="280" height="40" fill="#0E6B3D" rx="5"/>
    <text x="140" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">👤 USER</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: string (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">username: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">fullName: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">password: string (hashed)</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">role: UserRole</text>
    <text x="10" y="165" font-size="12" fill="#6B7280" font-style="italic">(chairperson | treasurer | secretary)</text>
  </g>

  <!-- EVENT Entity -->
  <g id="event-entity" transform="translate(500, 200)">
    <rect width="320" height="280" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="320" height="40" fill="#0E6B3D" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">📅 EVENT</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: number (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">title: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">date: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">endDate: string (optional)</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">venue: string</text>
    <text x="10" y="165" font-size="13" fill="#2E2E2E">time: string</text>
    <text x="10" y="185" font-size="13" fill="#2E2E2E">budget: number</text>
    <text x="10" y="205" font-size="13" fill="#2E2E2E">description: string</text>
    <text x="10" y="225" font-size="13" fill="#2E2E2E">status: EventStatus</text>
    <text x="10" y="245" font-size="13" fill="#2E2E2E">assignedOfficials: string[]</text>
    <text x="10" y="265" font-size="13" fill="#2E2E2E">documents: DocumentSet</text>
  </g>

  <!-- FUND ENTRY Entity -->
  <g id="fund-entity" transform="translate(900, 200)">
    <rect width="320" height="240" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="320" height="40" fill="#0E6B3D" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">💰 FUND_ENTRY</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: number (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">date: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">category: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">description: string</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">type: 'income' | 'expense'</text>
    <text x="10" y="165" font-size="13" fill="#2E2E2E">amount: number</text>
    <text x="10" y="185" font-size="13" fill="#2E2E2E">orNumber: string (optional)</text>
    <text x="10" y="205" font-size="13" fill="#2E2E2E">supplier: string (optional)</text>
    <text x="10" y="225" font-size="13" font-weight="bold" fill="#A7E89F">🔗 receiptId: number (FK)</text>
  </g>

  <!-- ACTIVITY PROPOSAL Entity -->
  <g id="activity-proposal-entity" transform="translate(100, 550)">
    <rect width="320" height="300" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="320" height="40" fill="#0E6B3D" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">📝 ACTIVITY_PROPOSAL</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: number (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">title: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">description: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">date: string</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">location: string</text>
    <text x="10" y="165" font-size="13" fill="#2E2E2E">budget: number</text>
    <text x="10" y="185" font-size="13" fill="#2E2E2E">targetParticipants: number</text>
    <text x="10" y="205" font-size="13" fill="#2E2E2E">requirements: string[]</text>
    <text x="10" y="225" font-size="13" fill="#2E2E2E">attachments: any[]</text>
    <text x="10" y="245" font-size="13" font-weight="bold" fill="#A7E89F">🔗 submittedBy: string (FK)</text>
    <text x="10" y="265" font-size="13" fill="#2E2E2E">submittedDate: string</text>
    <text x="10" y="285" font-size="13" fill="#2E2E2E">status: ProposalStatus</text>
  </g>

  <!-- BUDGET PROPOSAL Entity -->
  <g id="budget-proposal-entity" transform="translate(500, 550)">
    <rect width="320" height="280" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="320" height="40" fill="#0E6B3D" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">💵 BUDGET_PROPOSAL</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: number (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">title: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">description: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">totalAmount: number</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">items: BudgetItem[]</text>
    <text x="10" y="165" font-size="13" fill="#2E2E2E">attachments: any[]</text>
    <text x="10" y="185" font-size="13" font-weight="bold" fill="#A7E89F">🔗 submittedBy: string (FK)</text>
    <text x="10" y="205" font-size="13" fill="#2E2E2E">submittedDate: string</text>
    <text x="10" y="225" font-size="13" fill="#2E2E2E">status: ProposalStatus</text>
    <text x="10" y="245" font-size="13" fill="#2E2E2E">comments: string (optional)</text>
    <text x="10" y="265" font-size="13" fill="#2E2E2E">approvalDate: string (optional)</text>
  </g>

  <!-- NOTIFICATION Entity -->
  <g id="notification-entity" transform="translate(900, 550)">
    <rect width="320" height="220" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="320" height="40" fill="#0E6B3D" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">🔔 NOTIFICATION</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: number (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">type: NotificationType</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">title: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">message: string</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">timestamp: string</text>
    <text x="10" y="165" font-size="13" fill="#2E2E2E">read: boolean</text>
    <text x="10" y="185" font-size="13" font-weight="bold" fill="#A7E89F">🔗 recipientRole: UserRole (FK)</text>
    <text x="10" y="205" font-size="13" fill="#2E2E2E">link: string (optional)</text>
  </g>

  <!-- RECEIPT Entity -->
  <g id="receipt-entity" transform="translate(100, 920)">
    <rect width="320" height="220" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="320" height="40" fill="#0E6B3D" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">🧾 RECEIPT</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: number (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">fileName: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">fileUrl: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">uploadDate: string</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">category: string</text>
    <text x="10" y="165" font-size="13" fill="#2E2E2E">orNumber: string</text>
    <text x="10" y="185" font-size="13" fill="#2E2E2E">amount: number</text>
    <text x="10" y="205" font-size="13" fill="#2E2E2E">supplier: string</text>
  </g>

  <!-- ACTIVITY LOG Entity -->
  <g id="activity-log-entity" transform="translate(500, 920)">
    <rect width="320" height="200" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="320" height="40" fill="#0E6B3D" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">📋 ACTIVITY_LOG</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: number (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">type: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">action: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">description: string</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">timestamp: string</text>
    <text x="10" y="165" font-size="13" font-weight="bold" fill="#A7E89F">🔗 userId: string (FK)</text>
    <text x="10" y="185" font-size="13" fill="#2E2E2E">metadata: any (optional)</text>
  </g>

  <!-- SETTINGS Entity -->
  <g id="settings-entity" transform="translate(900, 920)">
    <rect width="320" height="200" fill="#ffffff" stroke="#0E6B3D" stroke-width="3" rx="5"/>
    <rect width="320" height="40" fill="#0E6B3D" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">⚙️ SETTINGS</text>
    
    <text x="10" y="65" font-size="13" font-weight="bold" fill="#2E2E2E">🔑 id: string (PK)</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">skName: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">barangay: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">contactEmail: string</text>
    <text x="10" y="145" font-size="13" fill="#2E2E2E">contactPhone: string</text>
    <text x="10" y="165" font-size="13" fill="#2E2E2E">fiscalYear: string</text>
    <text x="10" y="185" font-size="13" fill="#2E2E2E">logoUrl: string (optional)</text>
  </g>

  <!-- DOCUMENT Entity (Embedded) -->
  <g id="document-entity" transform="translate(100, 1200)">
    <rect width="320" height="180" fill="#FFF4CC" stroke="#8B7500" stroke-width="2" rx="5" stroke-dasharray="5,5"/>
    <rect width="320" height="40" fill="#8B7500" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">📄 DOCUMENT (Embedded)</text>
    
    <text x="10" y="65" font-size="13" fill="#2E2E2E">name: string</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">data: string (base64)</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">uploadedAt: string</text>
    <text x="10" y="125" font-size="13" fill="#2E2E2E">uploadedBy: string</text>
    <text x="10" y="145" font-size="12" fill="#6B7280" font-style="italic">Types: photos[], receipts[],</text>
    <text x="10" y="165" font-size="12" fill="#6B7280" font-style="italic">attendance, others[]</text>
  </g>

  <!-- BUDGET ITEM Entity (Embedded) -->
  <g id="budget-item-entity" transform="translate(500, 1200)">
    <rect width="320" height="140" fill="#FFF4CC" stroke="#8B7500" stroke-width="2" rx="5" stroke-dasharray="5,5"/>
    <rect width="320" height="40" fill="#8B7500" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">💲 BUDGET_ITEM (Embedded)</text>
    
    <text x="10" y="65" font-size="13" fill="#2E2E2E">category: string</text>
    <text x="10" y="85" font-size="13" fill="#2E2E2E">description: string</text>
    <text x="10" y="105" font-size="13" fill="#2E2E2E">amount: number</text>
    <text x="10" y="125" font-size="12" fill="#6B7280" font-style="italic">Part of BudgetProposal.items[]</text>
  </g>

  <!-- Relationships -->
  
  <!-- User to Activity Proposal (1:N) -->
  <line x1="240" y1="380" x2="240" y2="550" stroke="#0E6B3D" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="250" y="465" font-size="12" fill="#0E6B3D" font-weight="bold">submits</text>
  <text x="250" y="480" font-size="11" fill="#6B7280">1:N</text>

  <!-- User to Budget Proposal (1:N) -->
  <line x1="340" y1="380" x2="620" y2="550" stroke="#0E6B3D" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="470" y="465" font-size="12" fill="#0E6B3D" font-weight="bold">submits</text>
  <text x="470" y="480" font-size="11" fill="#6B7280">1:N</text>

  <!-- User to Activity Log (1:N) -->
  <line x1="240" y1="380" x2="580" y2="920" stroke="#0E6B3D" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="350" y="650" font-size="12" fill="#0E6B3D" font-weight="bold">performs</text>
  <text x="350" y="665" font-size="11" fill="#6B7280">1:N</text>

  <!-- Receipt to Fund Entry (1:N) -->
  <line x1="420" y1="1020" x2="980" y2="440" stroke="#0E6B3D" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="700" y="730" font-size="12" fill="#0E6B3D" font-weight="bold">attached to</text>
  <text x="700" y="745" font-size="11" fill="#6B7280">1:N</text>

  <!-- Event to Documents (1:N embedded) -->
  <line x1="660" y1="480" x2="310" y2="1200" stroke="#8B7500" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-dotted)"/>
  <text x="440" y="840" font-size="12" fill="#8B7500" font-weight="bold">contains</text>
  <text x="440" y="855" font-size="11" fill="#6B7280">1:N (embedded)</text>

  <!-- Budget Proposal to Budget Items (1:N embedded) -->
  <line x1="660" y1="830" x2="660" y2="1200" stroke="#8B7500" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-dotted)"/>
  <text x="670" y="1015" font-size="12" fill="#8B7500" font-weight="bold">contains</text>
  <text x="670" y="1030" font-size="11" fill="#6B7280">1:N (embedded)</text>

  <!-- User approves Activity Proposal -->
  <path d="M 380 300 Q 450 420 420 550" stroke="#CE1126" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)" stroke-dasharray="3,3"/>
  <text x="390" y="420" font-size="11" fill="#CE1126" font-weight="bold">approves</text>
  <text x="390" y="435" font-size="10" fill="#6B7280">(Chairperson)</text>

  <!-- User approves Budget Proposal -->
  <path d="M 380 320 Q 540 420 680 550" stroke="#CE1126" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)" stroke-dasharray="3,3"/>
  <text x="520" y="435" font-size="11" fill="#CE1126" font-weight="bold">approves</text>
  <text x="520" y="450" font-size="10" fill="#6B7280">(Chairperson)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0E6B3D" />
    </marker>
    <marker id="arrowhead-dotted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B7500" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#CE1126" />
    </marker>
  </defs>

  <!-- Notes Section -->
  <g transform="translate(50, 1420)">
    <rect x="0" y="0" width="1300" height="150" fill="#E8F5EE" stroke="#0E6B3D" stroke-width="2" rx="5"/>
    <text x="650" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#0E6B3D">📌 SYSTEM NOTES</text>
    
    <text x="20" y="55" font-size="13" fill="#2E2E2E" font-weight="bold">Relationships:</text>
    <text x="20" y="75" font-size="12" fill="#2E2E2E">• Solid lines (—) = Direct relationships with foreign keys</text>
    <text x="20" y="92" font-size="12" fill="#2E2E2E">• Dashed lines (---) = Embedded/nested data structures</text>
    <text x="20" y="109" font-size="12" fill="#2E2E2E">• Red dashed lines (---) = Approval workflow relationships</text>
    
    <text x="700" y="55" font-size="13" fill="#2E2E2E" font-weight="bold">Key Features:</text>
    <text x="700" y="75" font-size="12" fill="#2E2E2E">• Role-based access: Chairperson, Treasurer, Secretary</text>
    <text x="700" y="92" font-size="12" fill="#2E2E2E">• Proposal workflow: Submit → Review → Approve/Return</text>
    <text x="700" y="109" font-size="12" fill="#2E2E2E">• Public transparency: Approved data visible on public portal</text>
    
    <text x="20" y="133" font-size="12" fill="#0E6B3D" font-weight="bold">Storage: LocalStorage (Frontend simulation) | Can be migrated to Supabase/PostgreSQL</text>
  </g>
</svg>